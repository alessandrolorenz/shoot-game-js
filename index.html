<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="3D Grid Runner - Endless runner game with depth-based obstacles">
    <title>3D Grid Runner</title>
    <style>
        /* ===== CSS RESET & BASE STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: #000;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ===== CANVAS CONTAINER ===== */
        #game-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* ===== UI OVERLAY ===== */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .ui-overlay > * {
            pointer-events: auto;
        }

        /* ===== HUD (Score Display) ===== */
        #hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }

        #score {
            font-size: 36px;
            color: #00ff88;
            margin: 5px 0;
        }

        #high-score {
            font-size: 18px;
            color: #ffaa00;
        }

        /* ===== START SCREEN ===== */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #start-screen.hidden {
            display: none;
        }

        #start-screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        #start-screen p {
            font-size: 18px;
            margin: 10px 0;
            color: #ccc;
        }

        .btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #000;
            background: linear-gradient(135deg, #00ff88, #00cc66);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .controls-info {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            max-width: 400px;
        }

        .controls-info h3 {
            margin-bottom: 15px;
            color: #00ff88;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 16px;
        }

        /* ===== GAME OVER SCREEN ===== */
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #game-over-screen.visible {
            display: flex;
        }

        #game-over-screen h2 {
            font-size: 56px;
            color: #ff4444;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }

        #final-score {
            font-size: 32px;
            color: #00ff88;
            margin: 10px 0;
        }

        #new-high-score {
            font-size: 24px;
            color: #ffaa00;
            margin: 10px 0;
            display: none;
        }

        #new-high-score.visible {
            display: block;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        /* ===== SHOOT MODE BUTTONS ===== */
        .mode-buttons {
            display: flex;
            gap: 16px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            margin-top: 0;
            padding: 12px 28px;
            font-size: 17px;
        }

        .mode-btn.secondary {
            background: linear-gradient(135deg, #0088ff, #0055cc);
            box-shadow: 0 4px 15px rgba(0, 136, 255, 0.4);
        }

        .mode-btn.secondary:hover {
            box-shadow: 0 6px 20px rgba(0, 136, 255, 0.6);
        }

        /* ===== MOBILE CONTROLS ===== */
        #mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: grid;
            grid-template-columns: 48px 48px 48px;
            grid-template-rows: 48px 48px;
            gap: 8px;
            z-index: 10;
        }

        .control-btn {
            width: 48px;
            height: 48px;
            background: rgba(0, 255, 136, 0.25);
            border: 2px solid rgba(0, 255, 136, 0.5);
            border-radius: 10px;
            font-size: 20px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            backdrop-filter: blur(8px);
            touch-action: manipulation;
        }

        .control-btn:active {
            background: rgba(0, 255, 136, 0.55);
            transform: scale(0.93);
        }

        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }

        /* ===== ACTION BUTTONS (shoot + bomb) ===== */
        #action-btns {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        #btn-bomb {
            width: 60px;
            height: 60px;
            background: rgba(255, 100, 0, 0.4);
            border: 2px solid rgba(255, 160, 0, 0.9);
            border-radius: 50%;
            font-size: 26px;
            color: #fff;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            box-shadow: 0 0 16px rgba(255, 120, 0, 0.7);
            animation: bombPulse 0.75s infinite;
        }

        #btn-bomb.visible {
            display: flex;
        }

        @keyframes bombPulse {
            0%, 100% { transform: scale(1);    box-shadow: 0 0 16px rgba(255,120,0,0.7); }
            50%       { transform: scale(1.12); box-shadow: 0 0 30px rgba(255,200,0,1);   }
        }

        #btn-shoot {
            width: 72px;
            height: 72px;
            background: rgba(255, 50, 50, 0.35);
            border: 2px solid rgba(255, 80, 80, 0.85);
            border-radius: 50%;
            font-size: 30px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            transition: all 0.15s ease;
            box-shadow: 0 0 12px rgba(255, 60, 60, 0.5);
        }

        #btn-shoot:active {
            background: rgba(255, 50, 50, 0.7);
            transform: scale(0.91);
        }

        #btn-shoot.hidden {
            display: none;
        }

        /* ===== LOADING INDICATOR ===== */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #00ff88;
            z-index: 50;
        }

        #loading.hidden {
            display: none;
        }

        .spinner {
            border: 4px solid rgba(0, 255, 136, 0.3);
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== RESPONSIVE DESIGN ===== */
        @media (max-width: 768px) {
            #start-screen h1 { font-size: 36px; }
            #start-screen p { font-size: 16px; }
            .btn { padding: 12px 30px; font-size: 18px; }
            #hud { font-size: 20px; }
            #score { font-size: 28px; }
        }

        @media (min-width: 769px) {
            #mobile-controls { display: none; }
            #action-btns { display: none; }
        }
    </style>
</head>
<body>
    <!-- Game Canvas -->
    <div id="game-canvas"></div>

    <!-- UI Overlay -->
    <div class="ui-overlay">
        <!-- Loading Screen -->
        <div id="loading">
            <div class="spinner"></div>
            <p>Loading Assets...</p>
        </div>

        <!-- HUD -->
        <div id="hud">
            <div>Score</div>
            <div id="score">0</div>
            <div id="high-score">High Score: 0</div>
            <div id="kills-display" style="font-size:15px;color:#ff8844;margin-top:4px;">Kills: 0</div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen">
            <h1>🎮 3D GRID RUNNER</h1>
            <p>Dodge obstacles coming from the front!</p>
            <p>Survive as long as you can</p>
            <div class="controls-info">
                <h3>Controls</h3>
                <div class="control-row">
                    <span>Move:</span>
                    <span>Arrow Keys / WASD</span>
                </div>
                <div class="control-row">
                    <span>Pause:</span>
                    <span>Space / P</span>
                </div>
            </div>
            <p style="margin-top:24px;color:#aaa;font-size:15px;">Choose your shooting mode:</p>
            <div class="mode-buttons">
                <button class="btn mode-btn" id="btn-auto-shoot">🤖 Auto Shoot</button>
                <button class="btn mode-btn secondary" id="btn-manual-shoot">🎯 Manual Shoot</button>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen">
            <h2>GAME OVER</h2>
            <div id="final-score">Score: 0</div>
            <div id="new-high-score">🏆 NEW HIGH SCORE! 🏆</div>
            <button class="btn" id="restart-btn">PLAY AGAIN</button>
        </div>

        <!-- Mobile Controls -->
        <div id="mobile-controls">
            <button class="control-btn" id="btn-up">⬆️</button>
            <button class="control-btn" id="btn-left">⬅️</button>
            <button class="control-btn" id="btn-down">⬇️</button>
            <button class="control-btn" id="btn-right">➡️</button>
        </div>

        <!-- Action Buttons (shoot + bomb) -->
        <div id="action-btns">
            <button id="btn-bomb">💣</button>
            <button id="btn-shoot">🔫</button>
        </div>
    </div>

    <!-- Import Map for Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
        }
    }
    </script>

    <!-- Game Script -->
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ===== GAME CONFIGURATION =====
        const CONFIG = {
            GRID: {
                X_POSITIONS: 3,
                Y_POSITIONS: 3,
                SPACING: 2.5,
                SPAWN_Z: -100,
                DESPAWN_Z: 5,
                COLLISION_THRESHOLD: 1.5
            },
            CAMERA: {
                FOV: 70,
                POSITION: { x: 0, y: 5, z: 8 },
                LOOKAT: { x: 0, y: 0, z: -10 }
            },
            GAME: {
                BASE_SPEED: 0.2,
                BASE_SPAWN_INTERVAL: 1000,
                SPEED_INCREASE: 1.08,
                SPAWN_DECREASE: 0.95,
                DIFFICULTY_INTERVAL: 10000,
                MAX_OBSTACLES: 20
            },
            PLAYER: {
                MOVE_SPEED: 0.2,
                SCALE: 2.0
            },
            BULLETS: {
                SPEED: 2.5,
                FIRE_RATE: 300,
                DESPAWN_Z: -120,
                HIT_RADIUS: 2.5,
                SIZE: 0.45
            }
        };

        // ===== GAME STATE MANAGEMENT =====
        class GameState {
            constructor() {
                this.state = 'LOADING';
                this.score = 0;
                this.highScore = parseInt(localStorage.getItem('highScore') || '0');
                this.speed = CONFIG.GAME.BASE_SPEED;
                this.spawnInterval = CONFIG.GAME.BASE_SPAWN_INTERVAL;
                this.startTime = 0;
                this.lastDifficultyIncrease = 0;
            }

            setState(newState) {
                this.state = newState;
                console.log(`Game state: ${newState}`);
            }

            updateScore(deltaTime) {
                if (this.state === 'PLAYING') {
                    this.score += deltaTime * 10;
                    this.updateUI();
                }
            }

            increaseDifficulty() {
                this.speed *= CONFIG.GAME.SPEED_INCREASE;
                this.spawnInterval *= CONFIG.GAME.SPAWN_DECREASE;
                console.log(`Difficulty increased! Speed: ${this.speed.toFixed(2)}, Interval: ${this.spawnInterval.toFixed(0)}ms`);
            }

            gameOver() {
                this.setState('GAMEOVER');
                const finalScore = Math.floor(this.score);
                const isNewHighScore = finalScore > this.highScore;
                
                if (isNewHighScore) {
                    this.highScore = finalScore;
                    localStorage.setItem('highScore', this.highScore.toString());
                }

                this.showGameOver(finalScore, isNewHighScore);
            }

            showGameOver(finalScore, isNewHighScore) {
                document.getElementById('final-score').textContent = `Score: ${finalScore}`;
                document.getElementById('new-high-score').classList.toggle('visible', isNewHighScore);
                document.getElementById('game-over-screen').classList.add('visible');
            }

            updateUI() {
                document.getElementById('score').textContent = Math.floor(this.score);
                document.getElementById('high-score').textContent = `High Score: ${this.highScore}`;
            }

            reset() {
                this.score = 0;
                this.speed = CONFIG.GAME.BASE_SPEED;
                this.spawnInterval = CONFIG.GAME.BASE_SPAWN_INTERVAL;
                this.startTime = Date.now();
                this.lastDifficultyIncrease = this.startTime;
                this.updateUI();
            }
        }

        // ===== MAIN GAME CLASS =====
        class GridRunnerGame {
            constructor() {
                this.gameState = new GameState();
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.player = null;
                this.obstacles = [];
                this.playerGridPos = { x: 1, y: 0 };
                this.playerTargetPos = { x: 1, y: 0 };
                this.lastSpawnTime = 0;
                this.loader = new GLTFLoader();
                this.models = { player: null, enemy: null, tank: null, envModels: [] };
                this.clock = new THREE.Clock();
                this.groundTiles = [];
                this.roadStripes = [];
                this.sideBuildings = [];
                this.particleSystem = null;
                this.particlePositions = null;
                this.bullets = [];
                this.lastShootTime = 0;
                this.shootMode = 'auto';
                this.destroyedCount = 0;
                this.bombReady = false;

                this.init();
            }

            async init() {
                this.setupScene();
                this.setupCamera();
                this.setupRenderer();
                this.setupLights();
                this.setupEnvironment();
                this.setupScrollingEnvironment();
                this.setupParticles();
                await this.loadAssets();
                this.setupSideBuildings();
                this.createPlayer();
                this.setupControls();
                this.setupUI();
                this.gameState.setState('MENU');
                this.hideLoading();
                this.animate();
            }

            setupScene() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x0a0a0a);
                this.scene.fog = new THREE.Fog(0x0a0a0a, 30, 60);
            }

            setupCamera() {
                const aspect = window.innerWidth / window.innerHeight;
                this.camera = new THREE.PerspectiveCamera(CONFIG.CAMERA.FOV, aspect, 0.1, 1000);
                this.camera.position.set(
                    CONFIG.CAMERA.POSITION.x,
                    CONFIG.CAMERA.POSITION.y,
                    CONFIG.CAMERA.POSITION.z
                );
                this.camera.lookAt(
                    CONFIG.CAMERA.LOOKAT.x,
                    CONFIG.CAMERA.LOOKAT.y,
                    CONFIG.CAMERA.LOOKAT.z
                );
            }

            setupRenderer() {
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                document.getElementById('game-canvas').appendChild(this.renderer.domElement);

                window.addEventListener('resize', () => this.onWindowResize(), false);
            }

            setupLights() {
                // Ambient light
                const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
                this.scene.add(ambientLight);

                // Directional light (main)
                const dirLight = new THREE.DirectionalLight(0xffffff, 1);
                dirLight.position.set(5, 10, 5);
                dirLight.castShadow = true;
                dirLight.shadow.camera.left = -20;
                dirLight.shadow.camera.right = 20;
                dirLight.shadow.camera.top = 20;
                dirLight.shadow.camera.bottom = -20;
                this.scene.add(dirLight);

                // Hemisphere light for better atmosphere
                const hemiLight = new THREE.HemisphereLight(0x4488ff, 0x002244, 0.3);
                this.scene.add(hemiLight);
            }

            setupEnvironment() {
                // Ground plane
                const groundGeometry = new THREE.PlaneGeometry(50, 100);
                const groundMaterial = new THREE.MeshStandardMaterial({
                    color: 0x1a1a2e,
                    roughness: 0.8,
                    metalness: 0.2
                });
                const ground = new THREE.Mesh(groundGeometry, groundMaterial);
                ground.rotation.x = -Math.PI / 2;
                ground.position.y = -3;
                ground.receiveShadow = true;
                this.scene.add(ground);

                // Grid helper
                const gridHelper = new THREE.GridHelper(50, 50, 0x00ff88, 0x003322);
                gridHelper.position.y = -1.99;
                // this.scene.add(gridHelper);

                // Add lane markers
                this.createLaneMarkers();
            }

            createLaneMarkers() {
                const markerGeometry = new THREE.BoxGeometry(0.1, 0.1, 100);
                const markerMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.3 });

                for (let x = 0; x < CONFIG.GRID.X_POSITIONS; x++) {
                    const marker = new THREE.Mesh(markerGeometry, markerMaterial);
                    const worldX = (x - 1) * CONFIG.GRID.SPACING;
                    marker.position.set(worldX, -1.9, -25);
                    this.scene.add(marker);
                }
            }

            setupScrollingEnvironment() {
                // === SCROLLING GROUND TILES ===
                const tileMat = new THREE.MeshStandardMaterial({ color: 0x0d0d1f, roughness: 0.9 });
                for (let i = 0; i < 3; i++) {
                    const tile = new THREE.Mesh(new THREE.PlaneGeometry(18, 40), tileMat);
                    tile.rotation.x = -Math.PI / 2;
                    tile.position.set(0, -3, 10 - i * 40);
                    tile.receiveShadow = true;
                    this.scene.add(tile);
                    this.groundTiles.push(tile);
                }

                // === MOVING NEON ROAD STRIPES ===
                const stripeMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.18 });
                for (let i = 0; i < 10; i++) {
                    const stripe = new THREE.Mesh(new THREE.PlaneGeometry(0.12, 5), stripeMat);
                    stripe.rotation.x = -Math.PI / 2;
                    stripe.position.set(0, -2.98, -i * 12);
                    this.scene.add(stripe);
                    this.roadStripes.push(stripe);
                }

            }

            setupSideBuildings() {
                const count = 16;
                const hasModels = this.models.envModels.length > 0;

                for (let i = 0; i < count; i++) {
                    for (const side of [-1, 1]) {
                        let obj;

                        if (hasModels) {
                            const template = this.models.envModels[
                                Math.floor(Math.random() * this.models.envModels.length)
                            ];
                            obj = template.clone();
                            const s = 5.5 + Math.random();
                            obj.scale.setScalar(s);
                            if (side === 1) obj.rotation.y = Math.PI;
                            obj.position.set(
                                side * (8.5 + Math.random() * 2.5),
                                -3,
                                -i * 9 - Math.random() * 7
                            );
                        } else {
                            // Fallback: BoxGeometry with optional glow
                            const h = 2 + Math.random() * 7;
                            const w = 1.0 + Math.random() * 1.8;
                            const d = 1.0 + Math.random() * 1.5;
                            const hasGlow = Math.random() > 0.5;
                            const glowColor = Math.random() > 0.5 ? 0x003311 : 0x000a22;
                            const mat = new THREE.MeshStandardMaterial({
                                color: 0x080812,
                                emissive: hasGlow ? glowColor : 0x000000,
                                emissiveIntensity: 1.0
                            });
                            obj = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                            obj.position.set(
                                side * (8.5 + Math.random() * 2.5),
                                -3 + h / 2,
                                -i * 9 - Math.random() * 7
                            );

                            if (hasGlow) {
                                const roofMat = new THREE.MeshBasicMaterial({
                                    color: Math.random() > 0.5 ? 0x00ff88 : 0x0055ff,
                                    transparent: true,
                                    opacity: 0.85
                                });
                                const roof = new THREE.Mesh(new THREE.BoxGeometry(w + 0.1, 0.08, d + 0.1), roofMat);
                                roof.position.copy(obj.position);
                                roof.position.y += h / 2;
                                this.scene.add(roof);
                                this.sideBuildings.push(roof);
                            }
                        }

                        obj.castShadow = true;
                        this.scene.add(obj);
                        this.sideBuildings.push(obj);
                    }
                }
            }

            setupParticles() {
                const count = 150;
                const positions = new Float32Array(count * 3);
                const colors = new Float32Array(count * 3);

                for (let i = 0; i < count; i++) {
                    positions[i * 3]     = (Math.random() - 0.5) * 26;
                    positions[i * 3 + 1] = (Math.random() - 0.5) * 14 - 1;
                    positions[i * 3 + 2] = -(Math.random() * 100);

                    // Green-to-cyan color variation
                    const t = Math.random();
                    colors[i * 3]     = t * 0.2;
                    colors[i * 3 + 1] = 0.55 + t * 0.45;
                    colors[i * 3 + 2] = 0.4 + (1 - t) * 0.6;
                }

                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

                const mat = new THREE.PointsMaterial({
                    size: 0.07,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.75,
                    sizeAttenuation: true,
                    depthWrite: false
                });

                this.particleSystem = new THREE.Points(geo, mat);
                this.scene.add(this.particleSystem);
                this.particlePositions = positions;
            }

            async loadAssets() {
                const loadModel = (path) => {
                    return new Promise((resolve) => {
                        this.loader.load(
                            path,
                            (gltf) => resolve(gltf.scene),
                            undefined,
                            (error) => {
                                console.warn(`Failed to load ${path}:`, error);
                                resolve(null);
                            }
                        );
                    });
                };

                try {
                    [this.models.player, this.models.enemy, this.models.tank] = await Promise.all([
                        loadModel('./models/player.glb'),
                        loadModel('./models/enemy.glb'),
                        loadModel('./models/tank.glb')
                    ]);

                    const envPaths = [
                        './models/environment-models/pixellabs-fantasy-signpost-3561.glb',
                        './models/environment-models/pixellabs-mine-3769.glb',
                        './models/environment-models/pixellabs-watermill-3425.glb',
                        './models/environment-models/watchtouwer.glb',
                    ];
                    this.models.envModels = (await Promise.all(envPaths.map(loadModel))).filter(Boolean);
                    console.log('Models loaded:', this.models);
                } catch (error) {
                    console.warn('Error loading models:', error);
                }
            }

            createPlayer() {
                if (this.models.player) {
                    this.player = this.models.player.clone();
                    this.player.scale.set(2.4, 2.4, 2.4);
                    // this.player.rotation.x = Math.PI;
                    this.player.rotation.y = Math.PI; 

                } else {
                    // Fallback: Create geometric player
                    const geometry = new THREE.ConeGeometry(0.5, 1.5, 8);
                    const material = new THREE.MeshStandardMaterial({ color: 0x00ff88 });
                    this.player = new THREE.Mesh(geometry, material);
                    this.player.rotation.x = Math.PI;
                }

                this.player.castShadow = true;
                this.updatePlayerPosition();
                this.scene.add(this.player);
            }

            createObstacle() {
                if (this.obstacles.length >= CONFIG.GAME.MAX_OBSTACLES) return;

                const gridX = Math.floor(Math.random() * CONFIG.GRID.X_POSITIONS);
                const gridY = Math.floor(Math.random() * CONFIG.GRID.Y_POSITIONS);

                let obstacle;
                let baseScale;

                // Try to use loaded models
                if (gridY === 0 && this.models.tank) {
                    obstacle = this.models.tank.clone();
                    baseScale = 2.5 + Math.random() * 0.5; // Base scale with random variation
                    obstacle.scale.set(baseScale, baseScale, baseScale);
                    obstacle.rotation.x = 160; 
                    obstacle.rotation.y = Math.PI / 2; 
                } else if (this.models.enemy) {
                    obstacle = this.models.enemy.clone();
                    obstacle.rotation.x = 160; 
                    obstacle.rotation.y = Math.PI / -2; 
                    baseScale = 4.5 + Math.random() * 0.5; // Base scale with random variation
                    obstacle.scale.set(baseScale, baseScale, baseScale);
                } else {
                    // Fallback: Create geometric obstacle
                    const geometry = new THREE.BoxGeometry(7, 7, 7);
                    const material = new THREE.MeshStandardMaterial({ color: 0xff4444 });
                    obstacle = new THREE.Mesh(geometry, material);
                    baseScale = 1.0;
                }

                obstacle.castShadow = true;
                const isTank = gridY === 0 && this.models.tank;
                obstacle.userData = {
                    gridX: gridX,
                    gridY: gridY,
                    z: CONFIG.GRID.SPAWN_Z,
                    baseScale: baseScale,
                    health: isTank ? 6 : 2,
                    type: isTank ? 'tank' : 'enemy'
                };

                this.updateObstaclePosition(obstacle);
                this.scene.add(obstacle);
                this.obstacles.push(obstacle);
            }

            updatePlayerPosition() {
                if (!this.player) return;

                // Smooth interpolation
                this.playerGridPos.x += (this.playerTargetPos.x - this.playerGridPos.x) * CONFIG.PLAYER.MOVE_SPEED;
                this.playerGridPos.y += (this.playerTargetPos.y - this.playerGridPos.y) * CONFIG.PLAYER.MOVE_SPEED;

                const worldX = (this.playerGridPos.x - 1) * CONFIG.GRID.SPACING;
                const worldY = (this.playerGridPos.y - 1) * CONFIG.GRID.SPACING;

                this.player.position.set(worldX, worldY, 0);
            }

            updateObstaclePosition(obstacle) {
                const worldX = (obstacle.userData.gridX - 1) * CONFIG.GRID.SPACING;
                const worldY = (obstacle.userData.gridY - 1) * CONFIG.GRID.SPACING;
                
                obstacle.position.set(worldX, worldY, obstacle.userData.z);

                // Scale effect for depth perception
                const scale = 1 + (obstacle.userData.z + CONFIG.GRID.SPAWN_Z) * 0.015;
                const baseScale = obstacle.userData.baseScale || 1;
                obstacle.scale.setScalar(baseScale * scale);
            }

            updateObstacles(deltaTime) {
                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const obstacle = this.obstacles[i];
                    obstacle.userData.z += this.gameState.speed;

                    this.updateObstaclePosition(obstacle);

                    // Check collision
                    if (Math.abs(obstacle.userData.z) < CONFIG.GRID.COLLISION_THRESHOLD) {
                        const playerX = Math.round(this.playerGridPos.x);
                        const playerY = Math.round(this.playerGridPos.y);

                        if (playerX === obstacle.userData.gridX && playerY === obstacle.userData.gridY) {
                            this.gameState.gameOver();
                            return;
                        }
                    }

                    // Remove obstacle if past player
                    if (obstacle.userData.z > CONFIG.GRID.DESPAWN_Z) {
                        this.scene.remove(obstacle);
                        this.obstacles.splice(i, 1);
                    }
                }
            }

            movePlayer(direction) {
                if (this.gameState.state !== 'PLAYING') return;

                switch (direction) {
                    case 'left':
                        this.playerTargetPos.x = Math.max(0, this.playerTargetPos.x - 1);
                        break;
                    case 'right':
                        this.playerTargetPos.x = Math.min(2, this.playerTargetPos.x + 1);
                        break;
                    case 'up':
                        this.playerTargetPos.y = Math.min(2, this.playerTargetPos.y + 1);
                        break;
                    case 'down':
                        this.playerTargetPos.y = Math.max(0, this.playerTargetPos.y - 1);
                        break;
                }
            }

            setupControls() {
                // Keyboard controls
                window.addEventListener('keydown', (e) => {
                    if (this.gameState.state === 'MENU' && (e.key === ' ' || e.key === 'Enter')) {
                        this.startGame();
                        return;
                    }

                    if (this.gameState.state === 'GAMEOVER' && (e.key === ' ' || e.key === 'Enter')) {
                        this.restartGame();
                        return;
                    }

                    if (this.gameState.state === 'PLAYING') {
                        switch (e.key) {
                            case 'ArrowLeft':
                            case 'a':
                            case 'A':
                                this.movePlayer('left');
                                break;
                            case 'ArrowRight':
                            case 'd':
                            case 'D':
                                this.movePlayer('right');
                                break;
                            case 'ArrowUp':
                            case 'w':
                            case 'W':
                                this.movePlayer('up');
                                break;
                            case 'ArrowDown':
                            case 's':
                            case 'S':
                                this.movePlayer('down');
                                break;
                            case ' ':
                                this.manualShoot();
                                break;
                            case 'b':
                            case 'B':
                                this.activateBomb();
                                break;
                        }
                    }
                });

                // Mobile controls
                document.getElementById('btn-left').addEventListener('click', () => this.movePlayer('left'));
                document.getElementById('btn-right').addEventListener('click', () => this.movePlayer('right'));
                document.getElementById('btn-up').addEventListener('click', () => this.movePlayer('up'));
                document.getElementById('btn-down').addEventListener('click', () => this.movePlayer('down'));

                // Touch events for better mobile experience
                ['btn-left', 'btn-right', 'btn-up', 'btn-down'].forEach(id => {
                    const btn = document.getElementById(id);
                    btn.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        btn.click();
                    });
                });
            }

            setupUI() {
                document.getElementById('btn-auto-shoot').addEventListener('click', () => {
                    this.shootMode = 'auto';
                    this.startGame();
                });
                document.getElementById('btn-manual-shoot').addEventListener('click', () => {
                    this.shootMode = 'manual';
                    this.startGame();
                });
                document.getElementById('restart-btn').addEventListener('click', () => this.restartGame());

                document.getElementById('btn-shoot').addEventListener('click', () => this.manualShoot());
                document.getElementById('btn-shoot').addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.manualShoot();
                });

                document.getElementById('btn-bomb').addEventListener('click', () => this.activateBomb());
                document.getElementById('btn-bomb').addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.activateBomb();
                });
            }

            startGame() {
                document.getElementById('start-screen').classList.add('hidden');
                this.gameState.reset();
                this.gameState.setState('PLAYING');
                this.lastSpawnTime = Date.now();
                
                // Clear any existing obstacles
                this.obstacles.forEach(obs => this.scene.remove(obs));
                this.obstacles = [];

                // Clear any existing bullets
                this.bullets.forEach(b => { this.scene.remove(b); b.geometry.dispose(); });
                this.bullets = [];
                this.lastShootTime = 0;

                // Reset kill/bomb state
                this.destroyedCount = 0;
                this.bombReady = false;
                document.getElementById('btn-bomb').classList.remove('visible');
                document.getElementById('kills-display').textContent = 'Kills: 0';

                // Show/hide shoot button based on mode
                const shootBtn = document.getElementById('btn-shoot');
                if (this.shootMode === 'manual') {
                    shootBtn.classList.remove('hidden');
                } else {
                    shootBtn.classList.add('hidden');
                }

                // Reset player position
                this.playerTargetPos = { x: 1, y: 0 };
                this.playerGridPos = { x: 1, y: 0 };
            }

            restartGame() {
                document.getElementById('game-over-screen').classList.remove('visible');
                this.startGame();
            }

            hideLoading() {
                document.getElementById('loading').classList.add('hidden');
            }

            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            update() {
                const deltaTime = this.clock.getDelta();
                const currentTime = Date.now();

                if (this.gameState.state === 'PLAYING') {
                    // Update score
                    this.gameState.updateScore(deltaTime);

                    // Update player
                    this.updatePlayerPosition();

                    // Update obstacles
                    this.updateObstacles(deltaTime);

                    // Auto-shoot and update bullets
                    this.checkAutoShoot();
                    this.updateBullets();

                    // Update scrolling environment and particles
                    this.updateScrollingEnvironment();
                    this.updateParticles();

                    // Spawn obstacles
                    if (currentTime - this.lastSpawnTime > this.gameState.spawnInterval) {
                        this.createObstacle();
                        this.lastSpawnTime = currentTime;
                    }

                    // Increase difficulty
                    if (currentTime - this.gameState.lastDifficultyIncrease > CONFIG.GAME.DIFFICULTY_INTERVAL) {
                        this.gameState.increaseDifficulty();
                        this.gameState.lastDifficultyIncrease = currentTime;
                    }
                }
            }

            updateScrollingEnvironment() {
                if (this.gameState.state !== 'PLAYING') return;
                const spd = this.gameState.speed;

                for (const tile of this.groundTiles) {
                    tile.position.z += spd;
                    if (tile.position.z > 30) tile.position.z -= 120;
                }

                for (const stripe of this.roadStripes) {
                    stripe.position.z += spd;
                    if (stripe.position.z > 6) stripe.position.z -= 120;
                }

                for (const building of this.sideBuildings) {
                    building.position.z += spd;
                    if (building.position.z > 15) building.position.z -= 150;
                }
            }

            updateParticles() {
                if (!this.particleSystem || this.gameState.state !== 'PLAYING') return;
                const pos = this.particlePositions;
                const spd = this.gameState.speed * 3;

                for (let i = 0; i < pos.length / 3; i++) {
                    pos[i * 3 + 2] += spd;
                    if (pos[i * 3 + 2] > 7) {
                        pos[i * 3]     = (Math.random() - 0.5) * 26;
                        pos[i * 3 + 1] = (Math.random() - 0.5) * 14 - 1;
                        pos[i * 3 + 2] = -100;
                    }
                }

                this.particleSystem.geometry.attributes.position.needsUpdate = true;
            }

            // ===== BULLET SYSTEM =====

            createBullet() {
                const geometry = new THREE.SphereGeometry(CONFIG.BULLETS.SIZE, 6, 6);
                const material = new THREE.MeshBasicMaterial({ color: 0xffff00 });
                const bullet = new THREE.Mesh(geometry, material);

                bullet.position.set(
                    this.player.position.x,
                    this.player.position.y,
                    this.player.position.z - 1.5
                );

                this.scene.add(bullet);
                this.bullets.push(bullet);
            }

            checkAutoShoot() {
                if (this.shootMode !== 'auto') return;
                const now = Date.now();
                if (now - this.lastShootTime >= CONFIG.BULLETS.FIRE_RATE) {
                    this.createBullet();
                    this.lastShootTime = now;
                }
            }

            manualShoot() {
                if (this.gameState.state !== 'PLAYING' || this.shootMode !== 'manual') return;
                const now = Date.now();
                if (now - this.lastShootTime >= CONFIG.BULLETS.FIRE_RATE) {
                    this.createBullet();
                    this.lastShootTime = now;
                }
            }

            updateBullets() {
                const speed = CONFIG.BULLETS.SPEED;
                const hitRadius = CONFIG.BULLETS.HIT_RADIUS;

                for (let bi = this.bullets.length - 1; bi >= 0; bi--) {
                    const bullet = this.bullets[bi];
                    bullet.position.z -= speed;

                    if (bullet.position.z < CONFIG.BULLETS.DESPAWN_Z) {
                        this.scene.remove(bullet);
                        bullet.geometry.dispose();
                        this.bullets.splice(bi, 1);
                        continue;
                    }

                    let hit = false;
                    for (let oi = this.obstacles.length - 1; oi >= 0; oi--) {
                        const obs = this.obstacles[oi];
                        const dx = bullet.position.x - obs.position.x;
                        const dy = bullet.position.y - obs.position.y;
                        const dz = bullet.position.z - obs.position.z;
                        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

                        if (dist < hitRadius) {
                            obs.userData.health--;
                            hit = true;

                            if (obs.userData.health <= 0) {
                                this.scene.remove(obs);
                                this.obstacles.splice(oi, 1);
                                this.onEnemyDestroyed();
                            }
                            break;
                        }
                    }

                    if (hit) {
                        this.scene.remove(bullet);
                        bullet.geometry.dispose();
                        this.bullets.splice(bi, 1);
                    }
                }
            }

            onEnemyDestroyed() {
                // +100 kill score
                this.gameState.score += 100;
                this.gameState.updateUI();

                this.destroyedCount++;
                document.getElementById('kills-display').textContent = `Kills: ${this.destroyedCount}`;

                // Every 10 kills → earn a bomb
                if (this.destroyedCount % 10 === 0 && !this.bombReady) {
                    this.bombReady = true;
                    document.getElementById('btn-bomb').classList.add('visible');
                }
            }

            activateBomb() {
                if (!this.bombReady || this.gameState.state !== 'PLAYING') return;

                // Destroy all current obstacles
                for (const obs of this.obstacles) {
                    this.scene.remove(obs);
                }
                this.obstacles = [];

                this.bombReady = false;
                document.getElementById('btn-bomb').classList.remove('visible');
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.update();
                this.renderer.render(this.scene, this.camera);
            }
        }

        // ===== INITIALIZE GAME =====
        const game = new GridRunnerGame();
    </script>
</body>
