<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="3D Grid Runner - Endless runner game with depth-based obstacles">
    <title>3D Grid Runner</title>
</head>
<body>
    <!-- Game Canvas -->
    <div id="game-canvas"></div>

    <!-- UI Overlay -->
    <div class="ui-overlay">
        <!-- Loading Screen -->
        <div id="loading">
            <div class="spinner"></div>
            <p>Loading Assets...</p>
        </div>

        <!-- HUD -->
        <div id="hud">
            <div>Score</div>
            <div id="score">0</div>
            <div id="high-score">High Score: 0</div>
            <div id="kills-display" style="font-size:15px;color:#ff8844;margin-top:4px;">Kills: 0</div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen">
            <h1>🎮 3D GRID RUNNER</h1>
            <p>Dodge obstacles coming from the front!</p>
            <p>Survive as long as you can</p>
            <div class="controls-info">
                <h3>Controls</h3>
                <div class="control-row">
                    <span>Move:</span>
                    <span>Arrow Keys / WASD</span>
                </div>
                <div class="control-row">
                    <span>Pause:</span>
                    <span>Space / P</span>
                </div>
            </div>
            <p style="margin-top:24px;color:#aaa;font-size:15px;">Choose your shooting mode:</p>
            <div class="mode-buttons">
                <button class="btn mode-btn" id="btn-auto-shoot">🤖 Auto Shoot</button>
                <button class="btn mode-btn secondary" id="btn-manual-shoot">🎯 Manual Shoot</button>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen">
            <h2>GAME OVER</h2>
            <div id="final-score">Score: 0</div>
            <div id="new-high-score">🏆 NEW HIGH SCORE! 🏆</div>
            <button class="btn" id="restart-btn">PLAY AGAIN</button>
        </div>

        <!-- Mobile Controls -->
        <div id="mobile-controls">
            <button class="control-btn" id="btn-up">⬆️</button>
            <button class="control-btn" id="btn-left">⬅️</button>
            <button class="control-btn" id="btn-down">⬇️</button>
            <button class="control-btn" id="btn-right">➡️</button>
        </div>

        <!-- Action Buttons (shoot + bomb) -->
        <div id="action-btns">
            <button id="btn-bomb">💣</button>
            <button id="btn-shoot">🔫</button>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
