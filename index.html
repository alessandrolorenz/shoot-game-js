<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WW2 Arcade Grid Runner</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
 position:absolute; bottom:20px; left:20px;
 display:grid; grid-template-columns:60px 60px 60px; gap:10px;
}
button { width:60px; height:60px; font-size:20px; }
</style>
</head>
<body>

<div id="ui">
<button onclick="move('up')">⬆️</button>
<button onclick="move('left')">⬅️</button>
<button onclick="move('down')">⬇️</button>
<button onclick="move('right')">➡️</button>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js';

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // sky

let camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,3,6);
camera.lookAt(0,0,0);

let renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

// GROUND (brown WW2 style)
let ground = new THREE.Mesh(
 new THREE.PlaneGeometry(50,100),
 new THREE.MeshStandardMaterial({color:0x5a3e1b})
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -2;
scene.add(ground);

// LANE COLORS (visual separation)
const laneColors = [
 0x8B4513, // ground brown
 0x87CEEB, // mid air light blue
 0xe0f7ff  // high air pale sky
];

// PLAYER (WW2 style green)
let playerX=1, playerY=1;
let targetX=1, targetY=1;
const spacing=2;

const player = new THREE.Mesh(
 new THREE.ConeGeometry(0.5,1,8),
 new THREE.MeshStandardMaterial({color:0x2e8b57})
);
player.rotation.x = Math.PI;
scene.add(player);

// OBSTACLES
let obstacles=[];

function spawnObstacle(){
 let x=Math.floor(Math.random()*3);
 let y=Math.floor(Math.random()*3);

 let mesh=new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:laneColors[y]})
 );

 mesh.userData={x,y,z:-50};
 scene.add(mesh);
 obstacles.push(mesh);
}

// CONTROLS
window.move=function(dir){
 if(dir==='left') targetX=Math.max(0,targetX-1);
 if(dir==='right') targetX=Math.min(2,targetX+1);
 if(dir==='up') targetY=Math.min(2,targetY+1);
 if(dir==='down') targetY=Math.max(0,targetY-1);
};

window.addEventListener('keydown',e=>{
 if(e.key==='ArrowLeft') move('left');
 if(e.key==='ArrowRight') move('right');
 if(e.key==='ArrowUp') move('up');
 if(e.key==='ArrowDown') move('down');
});

// SWIPE
let startX=0,startY=0;
window.addEventListener('touchstart',e=>{
 startX=e.touches[0].clientX;
 startY=e.touches[0].clientY;
});
window.addEventListener('touchend',e=>{
 let dx=e.changedTouches[0].clientX-startX;
 let dy=e.changedTouches[0].clientY-startY;

 if(Math.abs(dx)>Math.abs(dy)){
  if(dx>30) move('right');
  if(dx<-30) move('left');
 } else {
  if(dy>30) move('down');
  if(dy<-30) move('up');
 }
});

// UPDATE PLAYER
function updatePlayer(){
 playerX += (targetX-playerX)*0.2;
 playerY += (targetY-playerY)*0.2;

 player.position.x=(playerX-1)*spacing;
 player.position.y=(playerY-1)*spacing;
 player.position.z=0;
}

// OBSTACLES
function updateObstacles(){
 obstacles.forEach((obs,i)=>{
  obs.userData.z+=0.7;

  obs.position.x=(obs.userData.x-1)*spacing;
  obs.position.y=(obs.userData.y-1)*spacing;
  obs.position.z=obs.userData.z;

  let scale=1+(obs.userData.z+50)*0.02;
  obs.scale.set(scale,scale,scale);

  if(Math.abs(obs.userData.z)<1){
   if(Math.round(playerX)===obs.userData.x && Math.round(playerY)===obs.userData.y){
    alert("GAME OVER");
    location.reload();
   }
  }

  if(obs.userData.z>5){
   scene.remove(obs);
   obstacles.splice(i,1);
  }
 });
}

setInterval(spawnObstacle,800);

// LOOP
function animate(){
 requestAnimationFrame(animate);
 updatePlayer();
 updateObstacles();
 renderer.render(scene,camera);
}

animate();
</script>
</body>
</html>
